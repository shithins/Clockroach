<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="popup-body">
  <div class="container">
    <!-- Header with Clockroach Brand & Theme Toggle -->
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
      <div style="display: flex; align-items: center; gap: 8px;">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--accent-emerald)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="logo-icon">
          <!-- Antennas -->
          <path d="M7 6C6 3 9 2 12 5" stroke="var(--accent-indigo)" />
          <path d="M17 6C18 3 15 2 12 5" stroke="var(--accent-indigo)" />
          <!-- Beetle Clock Shell -->
          <circle cx="12" cy="13" r="6" />
          <polyline points="12 10 12 13 14 14" />
          <!-- Beetle/Cockroach legs -->
          <line x1="6" y1="11" x2="4" y2="10" />
          <line x1="6" y1="13" x2="4" y2="13" />
          <line x1="6" y1="15" x2="4" y2="16" />
          <line x1="18" y1="11" x2="20" y2="10" />
          <line x1="18" y1="13" x2="20" y2="13" />
          <line x1="18" y1="15" x2="20" y2="16" />
        </svg>
        <h1 style="margin: 0; font-size: 18px; font-weight: 800; background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent-indigo) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Clockroach</h1>
      </div>
      <button id="themeToggleBtn" class="theme-toggle-btn" title="Toggle Light/Dark Theme">
        <svg id="themeToggleIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
      </button>
    </div>

    <div id="loadingState" class="status">Connecting to database...</div>
    <div id="loginError" class="error" style="display:none;"></div>

    <!-- Email Fallback Sign-In -->
    <div id="emailSigninForm" style="display:none;">
      <p class="status" style="margin-bottom: 12px; text-align: left; color: var(--text-secondary);">Enter your email to sign in:</p>
      <label>Email Address</label>
      <input type="email" id="signinEmail" placeholder="employee@company.com">
      <button class="btn-primary" id="signinBtn" style="width: 100%; margin-top: 12px;">Sign In</button>
    </div>

    <!-- Greeting block -->
    <div id="greeting" class="status" style="display:none; text-align: left; font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 8px;"></div>

    <div id="mainView" style="display:none;">
      <!-- Tab Navigation -->
      <div id="tabContainer" class="popup-tabs">
        <button id="tabTracker" class="popup-tab active">Tracker</button>
        <button id="tabDashboard" class="popup-tab">Dashboard</button>
      </div>

      <!-- Tracker Tab View -->
      <div id="trackerView">
        <!-- Timer block -->
        <div id="timerContainer" class="timer-container" style="display:none;">
          <div id="timerCircle" class="timer-circle">
            <div id="timerDisplay" class="timer-display">00:00:00</div>
          </div>
          <div id="runningTaskLabel" class="running-task-badge"></div>
        </div>

        <!-- Start form -->
        <div id="startForm">
          <label>Project</label>
          <select id="projectSelect"></select>

          <label>Task Description</label>
          <input id="taskInput" list="taskSuggestions" placeholder="Type or pick a task...">
          <datalist id="taskSuggestions"></datalist>

          <button class="btn-start" id="startBtn" style="margin-top: 14px;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
            Start Timer
          </button>
        </div>

        <!-- Stop button -->
        <button class="btn-stop" id="stopBtn" style="display:none; margin-top: 14px;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect></svg>
          Stop Timer
        </button>
      </div>

      <!-- Dashboard Tab View -->
      <div id="dashboardView" style="display:none;">
        <!-- Stats Summary Card -->
        <div class="stats-summary-card">
          <div class="stat-box">
            <span class="stat-label">This Week</span>
            <span id="weekHours" class="stat-value">0.00h</span>
          </div>
          <div class="stat-divider"></div>
          <div class="stat-box">
            <span class="stat-label">This Month</span>
            <span id="monthHours" class="stat-value">0.00h</span>
          </div>
        </div>

        <!-- Section Header with Sorting -->
        <div class="section-header">
          <h3>Recent Entries</h3>
          <button id="sortBtn" class="btn-icon" title="Sort by Date">
            <span id="sortDirectionText">Newest</span>
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M19 12l-7 7-7-7"/></svg>
          </button>
        </div>

        <div id="dashboardLoading" class="status" style="margin-top: 12px;">Loading dashboard data...</div>
        <div id="entriesList" class="entries-list" style="display:none;"></div>
      </div>

      <!-- Edit Entry Modal (Overlay) -->
      <div id="editEntryModal" class="edit-modal" style="display:none;">
        <div class="edit-modal-content">
          <h3>Edit Entry Duration</h3>
          
          <div style="font-size: 11px; margin-bottom: 12px; color: var(--text-secondary); background: var(--bg-primary); padding: 8px; border-radius: 6px; border: 1px solid var(--border-color);">
            <div id="editEntryInfoProject" style="font-weight: 600; color: var(--text-primary);"></div>
            <div id="editEntryInfoTask" style="margin-top: 2px;"></div>
            <div id="editEntryInfoOriginal" style="margin-top: 4px; color: var(--accent-rose); font-size: 10px;"></div>
          </div>
          
          <label style="margin-top: 8px;">New Duration</label>
          <div style="display: flex; gap: 8px; align-items: center;">
            <input type="number" id="editHoursInput" min="0" placeholder="0" style="flex: 1; text-align: center;">
            <span style="font-size: 12px; color: var(--text-secondary);">hr</span>
            <input type="number" id="editMinutesInput" min="0" max="59" placeholder="0" style="flex: 1; text-align: center;">
            <span style="font-size: 12px; color: var(--text-secondary);">min</span>
          </div>
          
          <div id="editError" class="error" style="display:none; padding: 6px 10px; margin-top: 10px; font-size: 11px;"></div>
          
          <div style="display: flex; gap: 8px; margin-top: 16px;">
            <button id="saveEditBtn" class="btn-primary" style="flex: 1; padding: 8px 12px;">Save</button>
            <button id="cancelEditBtn" class="btn-secondary" style="flex: 1; padding: 8px 12px;">Cancel</button>
          </div>
        </div>
      </div>

      <!-- Navigation links -->
      <div id="adminLink" class="admin-link" style="display:none;">Open Admin Panel →</div>
      <div id="logoutLink" class="admin-link" style="margin-top: 8px; color: var(--text-muted); font-size: 11px;">Switch Account</div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
